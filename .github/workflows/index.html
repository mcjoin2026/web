<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McJoin | Fejlesztés alatt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; }
        
        .typing-text::after {
            content: "HAMAROSAN...";
            animation: typing 3s steps(12) infinite;
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid #6366f1;
            width: 0;
        }

        @keyframes typing {
            0%, 10% { width: 0; }
            50%, 80% { width: 100%; }
            90%, 100% { width: 0; }
        }

        .bg-glow {
            background: radial-gradient(circle at center, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
        }
    </style>
</head>
<body class="min-h-screen text-white overflow-x-hidden">

    <div class="fixed inset-0 bg-glow -z-10"></div>

    <nav class="relative z-20 flex justify-center gap-4 p-6">
        <a href="szerverfejlesztés.html" class="px-5 py-2 text-sm font-semibold bg-white/5 border border-white/10 rounded-full hover:bg-indigo-500/20 hover:border-indigo-500/50 transition-all duration-300">
            Szerver Információk
        </a>
        <a href="staffteam3.0.html" class="px-5 py-2 text-sm font-semibold bg-white/5 border border-white/10 rounded-full hover:bg-indigo-500/20 hover:border-indigo-500/50 transition-all duration-300">
            Staff Team
        </a>    
        <a href="szabalyzat.html" class="px-5 py-2 text-sm font-semibold bg-white/5 border border-white/10 rounded-full hover:bg-indigo-500/20 hover:border-indigo-500/50 transition-all duration-300">
            Szabályzat
        </a>
    </nav>

    <main class="flex flex-col items-center justify-center min-h-[80vh] text-center px-4">
        <div class="mb-6 inline-block p-3 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 shadow-2xl">
            <span class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
                McJoin
            </span>
        </div>

        <h1 class="text-5xl md:text-7xl font-black mb-4 tracking-tight">
            Valami <span class="text-indigo-500">nagy</span> készül.
        </h1>
        
        <p class="text-gray-400 text-lg md:text-xl max-w-md mx-auto mb-10">
            A szerver jelenleg fejlesztés alatt áll. Gőzerővel dolgozunk a funkciókon, hogy a legjobb élményt nyújthassuk.
        </p>

        <div class="relative group inline-block">
            <div class="absolute -inset-1 bg-gradient-to-r from-indigo-600 to-cyan-600 rounded-lg blur opacity-25 group-hover:opacity-75 transition duration-1000"></div>
            <button class="relative px-8 py-4 bg-black rounded-lg leading-none flex items-center divide-x divide-gray-600">
                <span class="flex items-center space-x-3 pr-6">
                  <span class="flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-3 w-3 rounded-full bg-indigo-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500"></span>
                  </span>
                  <span class="text-gray-100 font-bold uppercase tracking-widest text-sm">Szerver státusz:</span>
                </span>
                <span class="pl-6 text-indigo-400 font-mono font-medium tracking-tight typing-text"></span>
            </button>
        </div>

        <div class="mt-16 text-sm text-gray-500 font-medium">
            Kövess minket a frissítésekért: 
            <a href="https://discord.gg/BJnXtZJ7gN" class="text-indigo-400 hover:text-indigo-300 underline decoration-2 underline-offset-4 transition-colors">Discord Szerver</a>
        </div>
    </main>

</body>
</html>
